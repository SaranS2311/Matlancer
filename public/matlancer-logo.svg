<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0d1b4b"/>
    </linearGradient>
    <linearGradient id="goldGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c040"/>
      <stop offset="100%" stop-color="#a8893a"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d070"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <filter id="subtleShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0d1b4b" flood-opacity="0.2"/>
    </filter>
    <filter id="goldGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#c9a84c" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Transparent background — no fill -->

  <!-- Subtle ring accents -->
  <circle cx="340" cy="230" r="195" fill="none" stroke="#1e3a8a" stroke-width="0.8" opacity="0.3"/>
  <circle cx="340" cy="230" r="188" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2"/>

  <!-- M — Left outer leg + serifs -->
  <path d="M 182 390 L 182 105 L 200 105 L 200 390 Z" fill="url(#navyGrad)" filter="url(#subtleShadow)"/>
  <path d="M 170 105 L 212 105 L 212 118 L 170 118 Z" fill="url(#navyGrad)"/>
  <path d="M 170 378 L 212 378 L 212 390 L 170 390 Z" fill="url(#navyGrad)"/>

  <!-- M — Right outer leg + serifs -->
  <path d="M 480 390 L 480 105 L 498 105 L 498 390 Z" fill="url(#navyGrad)" filter="url(#subtleShadow)"/>
  <path d="M 468 105 L 510 105 L 510 118 L 468 118 Z" fill="url(#navyGrad)"/>
  <path d="M 468 378 L 510 378 L 510 390 L 468 390 Z" fill="url(#navyGrad)"/>

  <!-- M — Diagonals -->
  <path d="M 182 105 L 200 105 L 340 272 L 480 105 L 498 105 L 340 300 Z" fill="url(#navyGrad)"/>

  <!-- V notch gold accent -->
  <path d="M 332 285 L 340 300 L 348 285 L 344 285 L 340 293 L 336 285 Z" fill="#c9a84c" opacity="0.6"/>

  <!-- Bar chart bars -->
  <rect x="195" y="318" width="22" height="60" rx="1" fill="url(#barGrad1)" filter="url(#goldGlow)"/>
  <rect x="232" y="295" width="22" height="83" rx="1" fill="url(#barGrad2)" filter="url(#goldGlow)"/>
  <rect x="270" y="270" width="22" height="108" rx="1" fill="url(#barGrad2)" filter="url(#goldGlow)"/>
  <rect x="388" y="270" width="22" height="108" rx="1" fill="url(#barGrad2)" filter="url(#goldGlow)"/>
  <rect x="426" y="295" width="22" height="83" rx="1" fill="url(#barGrad2)" filter="url(#goldGlow)"/>
  <rect x="463" y="318" width="22" height="60" rx="1" fill="url(#barGrad1)" filter="url(#goldGlow)"/>

  <!-- Trend arrow -->
  <g filter="url(#goldGlow)">
    <path d="M 192 360 L 260 300 L 310 330 L 400 240 L 470 190"
          fill="none" stroke="url(#goldGradH)" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 456 178 L 484 185 L 474 212"
          fill="none" stroke="#f0d070" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="470" cy="190" r="3.5" fill="#f0d070"/>
  </g>

  <!-- Base line under bars -->
  <line x1="178" y1="379" x2="503" y2="379" stroke="#c9a84c" stroke-width="1.5" opacity="0.4"/>

  <!-- Decorative gold separators -->
  <line x1="240" y1="420" x2="440" y2="420" stroke="url(#goldGradH)" stroke-width="1.2" opacity="0.6"/>
  <line x1="290" y1="427" x2="390" y2="427" stroke="url(#goldGradH)" stroke-width="0.7" opacity="0.35"/>

  <!-- MATLANCER wordmark -->
  <text x="340" y="488"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="62" font-weight="700" letter-spacing="12"
        text-anchor="middle" fill="url(#navyGrad)">MATLANCER</text>

  <!-- Gold separator line -->
  <rect x="270" y="502" width="140" height="1.5" rx="0.75" fill="url(#goldGradH)"/>
  <rect x="268" y="498" width="1.5" height="8" fill="#c9a84c" opacity="0.7"/>
  <rect x="410.5" y="498" width="1.5" height="8" fill="#c9a84c" opacity="0.7"/>

  <!-- MARKETING sub-text -->
  <text x="340" y="548"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="400" letter-spacing="14"
        text-anchor="middle" fill="#2a4d8e">MARKETING</text>

  <!-- Dot accents -->
  <circle cx="226" cy="542" r="2" fill="#c9a84c" opacity="0.6"/>
  <circle cx="454" cy="542" r="2" fill="#c9a84c" opacity="0.6"/>
</svg>
